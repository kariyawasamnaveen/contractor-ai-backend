<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Estate Contractor</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    
    .login-container {
      background: white;
      padding: 3rem;
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      width: 100%;
      max-width: 440px;
      position: relative;
      overflow: hidden;
    }
    
    .login-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 6px;
      background: linear-gradient(90deg, #2563eb, #f97316);
    }
    
    .logo {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    
    .logo-icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #2563eb, #f97316);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
      box-shadow: 0 8px 16px rgba(37,99,235,0.3);
    }
    
    .logo-icon i {
      font-size: 40px;
      color: white;
    }
    
    .logo h1 {
      font-size: 1.875rem;
      color: #1e293b;
      margin-bottom: 0.5rem;
      font-weight: 700;
    }
    
    .logo p {
      color: #64748b;
      font-size: 0.95rem;
    }
    
    .form-group {
      margin-bottom: 1.5rem;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 0.625rem;
      color: #334155;
      font-weight: 600;
      font-size: 0.9rem;
    }
    
    .input-wrapper {
      position: relative;
    }
    
    .input-wrapper i {
      position: absolute;
      left: 1.125rem;
      top: 50%;
      transform: translateY(-50%);
      color: #64748b;
      font-size: 1.125rem;
    }
    
    .form-group input {
      width: 100%;
      padding: 1rem 1rem 1rem 3rem;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      font-size: 1rem;
      transition: all 0.3s;
      background: #f8fafc;
    }
    
    .form-group input:focus {
      outline: none;
      border-color: #2563eb;
      background: white;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
    }
    
    .btn-login {
      width: 100%;
      padding: 1.125rem;
      background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 1rem;
      box-shadow: 0 4px 12px rgba(37,99,235,0.4);
    }
    
    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(37,99,235,0.5);
    }
    
    .btn-login:active {
      transform: translateY(0);
    }
    
    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    
    .error-message {
      background: #fee2e2;
      color: #dc2626;
      padding: 0.875rem;
      border-radius: 8px;
      margin-bottom: 1.5rem;
      display: none;
      font-size: 0.875rem;
      border-left: 4px solid #dc2626;
    }
    
    .error-message.show {
      display: block;
    }
    
    .footer-text {
      text-align: center;
      margin-top: 2rem;
      color: #64748b;
      font-size: 0.875rem;
    }
    
    @media (max-width: 480px) {
      .login-container {
        padding: 2rem;
      }
      
      .logo h1 {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo">
      <div class="logo-icon">
        <i class="fas fa-home"></i>
      </div>
      <h1>Estate Contractor</h1>
      <p>Admin Dashboard Login</p>
    </div>
    
    <div class="error-message" id="errorMessage">
      Invalid credentials. Please try again.
    </div>
    
    <form onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="email">Email Address</label>
        <div class="input-wrapper">
          <i class="fas fa-envelope"></i>
          <input 
            type="email" 
            id="email" 
            name="email"
            required 
            placeholder="admin@estatecontractor.com"
            autocomplete="email"
          >
        </div>
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <i class="fas fa-lock"></i>
          <input 
            type="password" 
            id="password" 
            name="password"
            required 
            placeholder="Enter your password"
            autocomplete="current-password"
          >
        </div>
      </div>
      
      <button type="submit" class="btn-login" id="loginBtn">
        <i class="fas fa-sign-in-alt"></i> Sign In
      </button>
    </form>
    
    <div class="footer-text">
      © 2025 Estate Contractor. All rights reserved.
    </div>
  </div>

  <script>
    // Redirect if already logged in
    if (localStorage.getItem('admin_token')) {
      window.location.href = './index.html';
    }

    async function handleLogin(event) {
      event.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const loginBtn = document.getElementById('loginBtn');
      const errorMsg = document.getElementById('errorMessage');
      
      // Hide previous errors
      errorMsg.classList.remove('show');
      
      // Disable button during login
      loginBtn.disabled = true;
      loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing In...';
      
      try {
        // Call real backend API
        const response = await fetch('/api/admin/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ email, password })
        });
        
        const data = await response.json();
        
        if (response.ok && data.success) {
          // Save token and user data
          localStorage.setItem('admin_token', data.token);
          localStorage.setItem('admin_user', JSON.stringify(data.user));
          
          // Redirect to dashboard
          window.location.href = './index.html';
        } else {
          throw new Error(data.error || 'Login failed');
        }
        
      } catch (error) {
        console.error('Login error:', error);
        errorMsg.textContent = error.message || 'Invalid credentials. Please try again.';
        errorMsg.classList.add('show');
        
        // Re-enable button
        loginBtn.disabled = false;
        loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
      }
    }
  </script>
</body>
</html>
